<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
  <meta name="theme-color" content="#0a0a0b" />
  <title>Track Your Order — QuoteUnquote</title>
  <link rel="icon" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 32 32'%3E%3Cdefs%3E%3ClinearGradient id='g' x1='0' y1='0' x2='1' y2='1'%3E%3Cstop offset='0' stop-color='%23fa7e1e'/%3E%3Cstop offset='.5' stop-color='%23d62976'/%3E%3Cstop offset='1' stop-color='%234f5bd5'/%3E%3C/linearGradient%3E%3C/defs%3E%3Crect width='32' height='32' rx='7' fill='url(%23g)'/%3E%3Ctext x='16' y='25' font-family='monospace' font-size='24' fill='white' text-anchor='middle'%3E%E2%80%9D%3C/text%3E%3C/svg%3E" />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;700;800&family=Space+Mono:wght@400;700&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="/styles.css" />
</head>
<body>
  <header class="site-header">
    <div class="wrap">
      <a class="brand" href="/">Quote<span>Unquote</span></a>
      <nav class="nav-links"><a href="/">Home</a><a href="/#builder">Customize</a></nav>
    </div>
  </header>

  <main class="doc">
    <a class="back-link" href="/">&larr; Back to shop</a>
    <h1>Track Order</h1>
    <p class="updated">Enter the tracking token from your confirmation</p>

    <form id="trackForm" style="display:flex;gap:10px;flex-wrap:wrap;margin-bottom:8px">
      <input class="input" id="trackToken" style="flex:1;min-width:220px" type="text" placeholder="trk_xxxxxxxxxxxx" autocomplete="off" />
      <button class="btn" type="submit">Track</button>
    </form>
    <p class="pay-note" style="color:var(--ig-grey)">Your token looks like <span class="mono">trk_…</span> and is in your order confirmation. Custom garments are printed on demand — allow 3–5 business days for production before tracking updates.</p>

    <div id="trackResult" style="margin-top:26px"></div>
  </main>

  <script src="/track.js"></script>
</body>
</html>
